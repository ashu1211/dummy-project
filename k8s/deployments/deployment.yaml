apiVersion: apps/v1
kind: Deployment
metadata:
  name: nginx-deployment
  # namespace: default
  # replicas: 5
  # labels:
  #   name: ashwani
  #   status: available

spec:
  replicas: 10
  selector:
    matchLabels:
      app: nginx
  template:
    metadata:
      labels:
        app: nginx
    spec:
      containers:
      - name: nginx
        image: nginx:1.27
        env:
        - name: Name
          value: ashwani
        ports:
        - containerPort: 80