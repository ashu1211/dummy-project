services:
  backend:
    image: backend:latest
    depends_on:
      - mysql
    restart: unless-stopped
    environment:
      PORT: 5000
      DB_HOST: mysql
      DB_PORT: 3306
      DB_NAME: demo_app
      DB_USER: admin
      DB_PASSWORD: admin123
    ports:
      - "5000:5000"
    networks:
      - demo_app_network
networks:
  demo_app_network:
#     # external: true
    name: demo_app_network
 