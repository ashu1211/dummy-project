#version: "3.8"

services:
  frontend:
    image: frontend:latest
    container_name: frontend
    restart: unless-stopped
    extra_hosts:
      - "host.docker.internal:host-gateway"

    ports:
      - "80:80"
    networks:
      - demo_app_network
networks:
  demo_app_network:
    name: demo_app_network
